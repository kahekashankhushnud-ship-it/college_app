<!DOCTYPE html>
<html>
<head>
<title>Admission</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h2 class="text-center">Admission Form</h2>

        <form>
            <input class="form-control mb-3" placeholder="Full Name">
            <input class="form-control mb-3" placeholder="Age">

            <select class="form-control mb-3">
                <option>Select Course</option>
                <option>BCA</option>
                <option>BBA</option>
                <option>BSc</option>
            </select>

            <h5>Academics</h5>
            <input class="form-control mb-3" placeholder="10th Marks">
            <input class="form-control mb-3" placeholder="12th Marks">

            <button class="btn btn-primary w-100">Submit</button>
        </form>
    </div>
</div>

</body>
</html>
